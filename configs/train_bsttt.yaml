train:
  # Recommended defaults from the project blueprint.
  support_size: 8
  adapt_steps: 3
  lr: 1e-4
  weight_decay: 0.0

  # LoRA (fast weights)
  lora_rank: 8
  lora_alpha: 16
  lora_dropout: 0.0

  # Sequence handling
  max_seq_len: 2048

  # Adaptation policy
  reset_fast_weights_each_episode: true

  # Reproducibility
  seed: 42

  # Which objective(s) to use (used by BSTTT trainer / ablations)
  loss:
    name: action_reconstruction
    # For V2/V3 experiments, set to:
    # - action_reconstruction_plus_consistency
    # - action_reconstruction_plus_consistency_plus_temporal

